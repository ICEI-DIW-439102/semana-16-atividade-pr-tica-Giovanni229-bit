<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Pessoa | Absolutamente Histórico</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
   <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/estilos_cadastro.css">
</head>
<body>

<header>
  <div class="cabeçalho">
    <div class="logo-wrapper">
      <i class="bi bi-hourglass-split relogio-icon"></i>
    </div>
    <div class="slogan">
      <h1><strong>ABSOLUTAMENTE HISTÓRICO</strong></h1>
    </div>
    <a href="index.html" class="btn-voltar">
      <i class="bi bi-arrow-left-circle-fill me-1"></i>Voltar
    </a>
  </div>
</header>

<main class="cadastro-main">

  <h1 class="cadastro-titulo">
    <i class="bi bi-person-plus-fill me-2"></i>Cadastrar Pessoa Histórica
  </h1>
  <p class="cadastro-sub">Preencha os dados abaixo. A pessoa será salva via POST no JSON Server.</p>

  <div id="feedbackMsg" class="feedback d-none"></div>

  <form id="formCadastro" class="form-cadastro" novalidate>


    <div class="form-row">
      <div>
        <label for="nome">Nome completo *</label>
        <input type="text" id="nome" name="nome" required placeholder="Ex.: Joana d'Arc" />
      </div>
      <div>
        <label for="subtitulo">Subtítulo *</label>
        <input type="text" id="subtitulo" name="subtitulo" required placeholder="Ex.: A Santa Guerreira" />
      </div>
    </div>

    <div>
      <label for="descricao">Descrição curta * <small>(aparece no card)</small></label>
      <input type="text" id="descricao" name="descricao" required maxlength="200"
             placeholder="Resumo em até 200 caracteres" />
    </div>

    <div>
      <label for="descricaoCompleta">Descrição completa * <small>(aparece nos detalhes)</small></label>
      <textarea id="descricaoCompleta" name="descricaoCompleta" required
                placeholder="Conte a história completa da pessoa…"></textarea>
    </div>

    <div>
      <label for="imagem">URL da imagem principal *</label>
      <input type="url" id="imagem" name="imagem" required placeholder="https://…" />
    </div>

    <div class="form-row">
      <div>
        <label for="nacionalidade">Nacionalidade *</label>
        <input type="text" id="nacionalidade" name="nacionalidade" required placeholder="Ex.: Brasileira" />
      </div>
      <div>
        <label for="areaDeAtuacao">Área de atuação *</label>
        <input type="text" id="areaDeAtuacao" name="areaDeAtuacao" required
               placeholder="Ex.: Arte / Ciência" />
      </div>
    </div>

    <div class="form-row">
      <div>
        <label for="nascimento">Data de nascimento</label>
        <input type="text" id="nascimento" name="nascimento" placeholder="Ex.: 6 de janeiro de 1412" />
      </div>
      <div>
        <label for="falecimento">Data de falecimento</label>
        <input type="text" id="falecimento" name="falecimento" placeholder="Ex.: 30 de maio de 1431" />
      </div>
    </div>

    <div>
      <label for="legado">Legado</label>
      <input type="text" id="legado" name="legado" placeholder="O que essa pessoa deixou para a humanidade?" />
    </div>

  
    <fieldset class="fotos-fieldset">
      <legend><i class="bi bi-images me-1"></i>Fotos associadas</legend>
      <div id="fotosContainer">
      </div>
      <button type="button" class="btn-add-foto" id="btnAddFoto">
        <i class="bi bi-plus-circle me-1"></i>Adicionar mais uma foto
      </button>
    </fieldset>

    <div style="margin-bottom:1.4rem">
      <label class="check-label">
        <input type="checkbox" id="destaque" name="destaque" />
        <span>Marcar como destaque (aparece no carrossel)</span>
      </label>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary-cad" onclick="window.location.href='index.html'">
        <i class="bi bi-x-circle me-1"></i>Cancelar
      </button>
      <button type="submit" class="btn-primary-cad" id="btnSalvar">
        <i class="bi bi-floppy-fill me-1"></i>Salvar pessoa
      </button>
    </div>

  </form>
</main>

<footer>
  <p><i class="bi bi-hourglass-split me-2"></i>Absolutamente Histórico — 2026</p>
  <p class="footer-sub">Onde o passado persiste</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="cadastro_pessoaHistorica.js"></script>
</body>
</html>
