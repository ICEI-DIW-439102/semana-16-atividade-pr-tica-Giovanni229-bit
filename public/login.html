<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login e Cadastro | Absolutamente Histórico</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header>
    <div class="cabeçalho">
      <div class="logo-wrapper">
        <i class="bi bi-hourglass-split relogio-icon"></i>
      </div>
      <div class="slogan">
        <h1>ABSOLUTAMENTE HISTÓRICO</h1>
      </div>
      <div class="header-actions">
        <a href="index.html" class="btn-voltar"><i class="bi bi-arrow-left-circle-fill me-1"></i>Voltar</a>
      </div>
    </div>
  </header>

  <main>
    <div class="auth-card">
      <div class="auth-toggle">
        <button type="button" id="btnMostrarLogin" class="ativo">Entrar</button>
        <button type="button" id="btnMostrarCadastro">Cadastrar</button>
      </div>

      <form id="formLogin" class="auth-form">
        <h2 class="titulo-secao sepia"><i class="bi bi-person-lock me-2"></i>Entrar</h2>
        <input type="text" id="loginUsuario" placeholder="Usuário" required />
        <input type="password" id="senhaUsuario" placeholder="Senha" required />
        <div class="auth-actions">
          <button type="submit" class="btn-voltar">Entrar</button>
        </div>
      </form>

      <form id="formCadastro" class="auth-form d-none">
        <h2 class="titulo-secao marrom"><i class="bi bi-person-plus-fill me-2"></i>Cadastrar</h2>
        <input type="text" id="nomeCadastro" placeholder="Nome completo" required />
        <input type="email" id="emailCadastro" placeholder="E-mail" required />
        <input type="text" id="loginCadastro" placeholder="Nome de usuário" required />
        <input type="password" id="senhaCadastro" placeholder="Senha" required />
        <div class="auth-actions">
          <button type="submit" class="btn-voltar">Criar conta</button>
        </div>
      </form>

      <p id="mensagemAuth" class="mt-3 text-center" style="color:#8d6e63"></p>
    </div>
  </main>

  <footer>
    <p><i class="bi bi-hourglass-split me-2"></i>Absolutamente Histórico — 2026</p>
    <p class="footer-sub">Onde o passado persiste</p>
  </footer>

  <script>
    const API_AUTH = 'http://localhost:3000/usuarios';
    let modoAtual = 'login';

    function mostrarModo(modo) {
      modoAtual = modo;
      const loginForm = document.getElementById('formLogin');
      const cadastroForm = document.getElementById('formCadastro');
      const btnLogin = document.getElementById('btnMostrarLogin');
      const btnCadastro = document.getElementById('btnMostrarCadastro');
      const mensagem = document.getElementById('mensagemAuth');

      loginForm.classList.toggle('d-none', modo !== 'login');
      cadastroForm.classList.toggle('d-none', modo !== 'cadastro');
      btnLogin.classList.toggle('ativo', modo === 'login');
      btnCadastro.classList.toggle('ativo', modo === 'cadastro');
      mensagem.textContent = '';
    }

    async function realizarLogin(event) {
      event.preventDefault();
      const login = document.getElementById('loginUsuario').value.trim();
      const senha = document.getElementById('senhaUsuario').value.trim();
      const mensagem = document.getElementById('mensagemAuth');

      try {
        const response = await fetch(API_AUTH);
        const usuarios = await response.json();
        const usuario = usuarios.find((u) => u.login === login && u.senha === senha);

        if (!usuario) {
          mensagem.textContent = 'Credenciais inválidas. Tente novamente.';
          return;
        }

        sessionStorage.setItem('usuarioLogado', JSON.stringify(usuario));
        mensagem.textContent = 'Login realizado com sucesso!';
        setTimeout(() => window.location.href = 'index.html', 800);
      } catch (error) {
        mensagem.textContent = 'Não foi possível conectar ao servidor.';
      }
    }

    async function realizarCadastro(event) {
      event.preventDefault();
      const nome = document.getElementById('nomeCadastro').value.trim();
      const email = document.getElementById('emailCadastro').value.trim();
      const login = document.getElementById('loginCadastro').value.trim();
      const senha = document.getElementById('senhaCadastro').value.trim();
      const mensagem = document.getElementById('mensagemAuth');

      if (!nome || !email || !login || !senha) {
        mensagem.textContent = 'Preencha todos os campos.';
        return;
      }

      try {
        const response = await fetch(API_AUTH);
        const usuarios = await response.json();
        const jaExiste = usuarios.some((u) => u.login.toLowerCase() === login.toLowerCase() || u.email.toLowerCase() === email.toLowerCase());

        if (jaExiste) {
          mensagem.textContent = 'Já existe um usuário com esse login ou e-mail.';
          return;
        }

        const novoUsuario = {
          nome,
          email,
          login,
          senha,
          admin: false
        };

        const cadastroResponse = await fetch(API_AUTH, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(novoUsuario)
        });

        if (!cadastroResponse.ok) throw new Error('Erro ao criar usuário');

        const usuarioCriado = await cadastroResponse.json();
        sessionStorage.setItem('usuarioLogado', JSON.stringify(usuarioCriado));
        mensagem.textContent = 'Conta criada com sucesso!';
        setTimeout(() => window.location.href = 'index.html', 800);
      } catch (error) {
        mensagem.textContent = 'Não foi possível criar a conta.';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('btnMostrarLogin').addEventListener('click', () => mostrarModo('login'));
      document.getElementById('btnMostrarCadastro').addEventListener('click', () => mostrarModo('cadastro'));
      document.getElementById('formLogin').addEventListener('submit', realizarLogin);
      document.getElementById('formCadastro').addEventListener('submit', realizarCadastro);
      mostrarModo('login');
    });
  </script>
</body>
</html>
