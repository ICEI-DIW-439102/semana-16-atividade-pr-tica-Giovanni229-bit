<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhe | Absolutamente Histórico</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

<header>
  <div class="cabeçalho">
    <div class="logo-wrapper">
      <i class="bi bi-hourglass-split relogio-icon"></i>
    </div>
    <div class="slogan">
      <h1>ABSOLUTAMENTE HISTÓRICO</h1>
    </div>
    <a href="index.html" class="btn-voltar">
      <i class="bi bi-arrow-left-circle-fill me-1"></i>Voltar
    </a>
  </div>
</header>

<main class="detalhe-main">

  <div id="loadingDetalhe" class="text-center py-5">
    <div class="spinner-border text-secondary" role="status"></div>
    <p class="mt-3" style="color:#8d6e63">Carregando informações…</p>
  </div>

  <div id="erroDetalhe" class="d-none text-center py-5">
    <i class="bi bi-exclamation-triangle" style="font-size:3rem;color:#8d6e63"></i>
    <p id="erroDetalheMsg" class="mt-3" style="font-size:1.3rem;color:#5d4037"></p>
    <a href="index.html" class="btn-ver-mais mt-3 d-inline-block">Voltar ao início</a>
  </div>

  <div id="detalhe-conteudo" class="d-none"></div>

  <div id="secao-fotos" class="d-none">
    <h2 class="titulo-secao marrom mt-5">
      <i class="bi bi-images me-2"></i>FOTOS ASSOCIADAS
    </h2>
    <div class="fotos-grid" id="fotos-grid"></div>
  </div>

</main>

<footer>
  <p><i class="bi bi-hourglass-split me-2"></i>Absolutamente Histórico — Todos os direitos reservados - 2026</p>
  <p class="footer-sub">Onde o passado persiste.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/scripts/detalhes.js"></script>
<script>iniciarDetalhes();</script>
</body>
</html>
